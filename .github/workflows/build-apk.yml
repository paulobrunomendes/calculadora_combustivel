name: Build e publicar APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair versão do pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versão detectada: $VERSION"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache keystore de assinatura (garante chave consistente entre builds)
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-signing-keystore-v1

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Criar config_secret.dart com token do Mapbox
        run: |
          echo "const mapboxToken = '${{ secrets.MAPBOX_TOKEN }}';" > lib/config_secret.dart

      - name: Configurar NDK 28 (requerido pelo pacote jni)
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Aceitar licenças Android SDK
        run: yes | sdkmanager --licenses || true

      - name: Instalar plataforma Android necessária
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

      - name: Instalar dependências
        run: flutter pub get

      - name: Verificar ambiente Flutter
        run: flutter doctor -v

      - name: Build APK Release
        id: build_apk
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/flutter_build.log

      - name: Mostrar erros no summary (se falhou)
        if: failure()
        run: |
          echo "## Build Failure Details" >> $GITHUB_STEP_SUMMARY
          echo '### Erros encontrados:' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(FAILURE|error:|Exception|Caused by|BUILD FAILED|what went wrong)" /tmp/flutter_build.log | tail -40 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '### Últimas 80 linhas:' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 /tmp/flutter_build.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Renomear APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/abast-smart-v${{ steps.version.outputs.version }}.apk

      - name: Criar ou atualizar release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Abast Smart v${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/abast-smart-v${{ steps.version.outputs.version }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
