name: Build e publicar APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair versão do pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versão detectada: $VERSION"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Criar config_secret.dart com token do Mapbox
        run: |
          echo "const mapboxToken = '${{ secrets.MAPBOX_TOKEN }}';" > lib/config_secret.dart

      - name: Aceitar licenças Android SDK
        run: yes | sdkmanager --licenses || true

      - name: Instalar plataforma Android necessária
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

      - name: Instalar dependências
        run: flutter pub get

      - name: Verificar ambiente Flutter
        run: flutter doctor -v

      - name: Build APK Release
        run: flutter build apk --release

      - name: Renomear APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/abast-smart-v${{ steps.version.outputs.version }}.apk

      - name: Criar ou atualizar release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Abast Smart v${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/abast-smart-v${{ steps.version.outputs.version }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
