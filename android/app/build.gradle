plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.combustivel.app"
    compileSdk flutter.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.combustivel.app"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    signingConfigs {
        release {
            def kPath = System.getenv("KEYSTORE_PATH")
            def kPass = System.getenv("KEYSTORE_PASSWORD")
            def kAlias = System.getenv("KEY_ALIAS")
            def kKeyPass = System.getenv("KEY_PASSWORD")
            if (kPath != null && kPass != null) {
                storeFile file(kPath)
                storePassword kPass
                keyAlias kAlias ?: 'abast-smart'
                keyPassword kKeyPass ?: kPass
            } else {
                storeFile file("${System.getProperty('user.home')}/.android/debug.keystore")
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}
